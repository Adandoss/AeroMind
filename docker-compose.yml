services:
  db:
    image: mariadb:11.4
    container_name: aeromind-db
    environment:
      MARIADB_ROOT_PASSWORD: aeromind_root
      MARIADB_DATABASE: aeromind
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build: .
    container_name: aeromind-web
    environment:
      DATABASE_URL: mysql://root:aeromind_root@db:3306/aeromind
      AUTH_SECRET: ${AUTH_SECRET:-f69e6b4e4e93090956b9c9f7a7d4a234f9a3f2b4c10a439281a1a2b3c4d5e6f7}
      AUTH_TRUST_HOST: "true"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  # Database browser at http://localhost:8080
  # (Prisma Studio v7 cannot introspect MariaDB - see prisma/studio#1367 -
  # so we use Adminer instead. Login: server "db", user "root",
  # password "aeromind_root", database "aeromind".)
  adminer:
    image: adminer:5
    container_name: aeromind-adminer
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
